<!DOCTYPE html>
<head>
    <style>
        #movingImage {
            position: absolute;
            left: 0;
            top: 0;
            width: 50px;
            height: 50px;
            
            /* 1. Tell the browser WHAT to animate and HOW LONG (3 seconds) */
            transition: transform 3s ease-in-out;
            
            /* 2. Starting position (X: 0px, Y: 0px) */
            transform: translate(220px, 220px); 
        }
    </style>

</head>
<body>
    <img id="movingImage" src="./img/icon-blue.webp" alt="Smooth Player Icon">
    <button id="moveBtn">Move Image</button>
    
    <script>
        const image = document.querySelector('#movingImage');
            const button = document.querySelector('#moveBtn');

            button.addEventListener('click', () => {
                // Move the image 400 pixels right and 200 pixels down
                image.style.transform = 'translate(1400px, 400px)';
            });
                
                

    </script>

</body>
</html>
